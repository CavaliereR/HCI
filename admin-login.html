<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UE Election – Student Verification</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
    <link rel="icon" type="image/x-icon" href="images/logo.png"/>
</head>
<style>
  body {
      position: fixed; 
      overflow-y: scroll;
      width: 100%;
  }
</style>
<body>

  <div id="app-header"></div>

  <div class="verify-bg">
    <div class="verify-card">
      <div class="color-stripe">
        <div class="s1"></div>
        <div class="s2"></div>
        <div class="s3"></div>
      </div>
      <div class="verify-body">
        <h2>LOGIN</h2>
        <p>Enter your details to access the ballot settings.</p>

        <label for="inp-firstname">FIRST NAME</label>
        <input type="text" id="inp-firstname" placeholder="e.g. Juan" oninput="checkForm()"/>

        <label for="inp-lastname">LAST NAME</label>
        <input type="text" id="inp-lastname" placeholder="e.g. Dela Cruz" oninput="checkForm()"/>

        <label for="inp-password">PASSWORD</label>
        <input type="password" id="inp-password" placeholder="Enter Your Password Here" oninput="checkForm()"/>

        <button class="btn-proceed" id="btn-proceed" disabled onclick="proceed()">Proceed to Admin Control Panel</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    document.getElementById('app-header').innerHTML = renderAdmin();

    const allowedValues = {
      firstname: ["Ferdinand", "Avie", "Krystoff"],
      lastname: ["Espiritu", "Ruar", "Jose"],
      password: ["password123", "password321", "password500"]
    };

    function checkForm() {
      const firstname = document.getElementById('inp-firstname').value.trim();
      const lastname = document.getElementById('inp-lastname').value.trim();
      const password = document.getElementById('inp-password').value.trim();
      const btn = document.getElementById('btn-proceed');

      if (firstname && lastname && password) {
        btn.disabled = false;
        btn.classList.add('ready');
      } else {
        btn.disabled = true;
        btn.classList.remove('ready');
      }
    }

    function proceed() {
      const firstname = document.getElementById('inp-firstname').value.trim();
      const lastname = document.getElementById('inp-lastname').value.trim();
      const password = document.getElementById('inp-password').value.trim();
      const btn = document.getElementById('btn-proceed');

      const validFirstname = allowedValues.firstname.includes(firstname);
      const validLastname = allowedValues.lastname.includes(lastname);
      const validPassword = allowedValues.password.includes(password);

      if (validFirstname && validFirstname && validFirstname) {
        window.location.href = 'admin-results.html';
      } else {
        alert("Invalid Name or Password");
      }
      
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
