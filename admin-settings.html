    ];

    function renderVoteChart(containerId, data) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = "";

        const maxVotes = Math.max(...data.map(d => d.count));

        data.forEach(person => {
            const row = document.createElement("div");
            row.className = "vote-row";

            const name = document.createElement("div");
            name.className = "vote-name";
            name.textContent = person.name;

            const bar = document.createElement("div");
            bar.className = "vote-bar";

            const fill = document.createElement("div");
            fill.className = "vote-fill";
            fill.style.width = (person.count / maxVotes * 100) + "%";
            fill.textContent = person.count;

            fill.style.backgroundColor = person.color || "#b01a2e";

            bar.appendChild(fill);
            row.appendChild(name);
            row.appendChild(bar);
            container.appendChild(row);
        });

    }

    renderVoteChart("vote-chart-csc1", CSCpres);
    renderVoteChart("vote-chart-csc2", CSCvp);
    renderVoteChart("vote-chart-csc3", CSCsec);
    renderVoteChart("vote-chart-csc4", CSCtres);
    renderVoteChart("vote-chart-csc5", CSCaud);
    renderVoteChart("vote-chart-csc6", CSCpro);

    renderVoteChart("vote-chart-eng1", ENGpres);
    renderVoteChart("vote-chart-eng2", ENGvp);
    renderVoteChart("vote-chart-eng3", ENGsec);
    renderVoteChart("vote-chart-eng4", ENGtres);
    renderVoteChart("vote-chart-eng5", ENGaud);
