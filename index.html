<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UE Election – Student Verification</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <div id="app-header"></div>

  <div class="verify-bg">
    <div class="verify-card">
      <div class="color-stripe">
        <div class="s1"></div>
        <div class="s2"></div>
        <div class="s3"></div>
      </div>
      <div class="verify-body">
        <div class="step-tag">Step 1 of 4</div>
        <h2>STUDENT VERIFICATION</h2>
        <p>Enter your details to access the official ballot. Each student may only vote once per election period.</p>

        <label for="inp-name">FULL NAME</label>
        <input type="text" id="inp-name" placeholder="e.g. Juan Dela Cruz" oninput="checkForm()"/>

        <label for="inp-id">STUDENT ID NUMBER</label>
        <input type="text" id="inp-id" placeholder="e.g 2024********" oninput="checkForm()"/>

        <label for="inp-college">COLLEGE / DEPARTMENT</label>
        <select id="inp-college" onchange="checkForm()">
          <option value="">-- Select College --</option>
          <option value="College of Engineering">College of Engineering</option>
          <option value="College of Business Administration">College of Business Administration</option>
          <option value="College of Education">College of Education</option>
          <option value="College of Arts &amp; Sciences">College of Arts &amp; Sciences</option>
          <option value="College of Nursing">College of Nursing</option>
          <option value="College of Computer Studies">College of Computer Studies</option>
        </select>

        <div class="privacy-note">🔒 Your vote is private. Your ID is only used to prevent duplicate votes. No personal data is stored beyond this session.</div>

        <button class="btn-proceed" id="btn-proceed" disabled onclick="proceed()">Proceed to Ballot</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    document.getElementById('app-header').innerHTML = renderHeader(1);

    function checkForm() {
      const name = document.getElementById('inp-name').value.trim();
      const id = document.getElementById('inp-id').value.trim();
      const college = document.getElementById('inp-college').value;
      const btn = document.getElementById('btn-proceed');

      if (name && id && college) {
        btn.disabled = false;
        btn.classList.add('ready');
      } else {
        btn.disabled = true;
        btn.classList.remove('ready');
      }
    }

    function proceed() {
      const name = document.getElementById('inp-name').value.trim();
      const id = document.getElementById('inp-id').value.trim();
      const college = document.getElementById('inp-college').value;

      saveVoterInfo({ name, id, college });
      sessionStorage.removeItem('ue_votes');
      window.location.href = 'ballot.html';
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
