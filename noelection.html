  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>

<body>

  <div id="app-header"></div>

  <div class="verify-bg">
    <div class="verify-card">

        <div class="s1"></div>
